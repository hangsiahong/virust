<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virust Chat</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Virust Chat</h1>
            <div class="connection-status" id="connectionStatus">
                <span class="status-dot disconnected"></span>
                <span class="status-text">Disconnected</span>
            </div>
        </header>

        <main>
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-message">
                    Welcome to Virust Chat! Enter your username to start.
                </div>
            </div>

            <div class="message-form" id="messageForm">
                <input
                    type="text"
                    id="usernameInput"
                    class="username-input"
                    placeholder="Enter username..."
                    maxlength="20"
                />
                <div class="message-input-group" id="messageInputGroup" style="display: none;">
                    <input
                        type="text"
                        id="messageInput"
                        class="message-input"
                        placeholder="Type a message..."
                        maxlength="500"
                        autocomplete="off"
                    />
                    <button id="sendButton" class="send-button">Send</button>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="/main.js"></script>
    <script>
        // HMR - Auto-injected by Virust dev mode
        if (window.location.port === '3000') {
            const ws = new WebSocket('ws://localhost:3000/ws');
            ws.onmessage = (msg) => {
                if (msg.data === 'reload') location.reload();
            };
        }
    </script>
</body>
</html>
